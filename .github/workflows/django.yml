name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

  deploy:
    name: Deploy To cPanel
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Trust cPanel host
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${CPANEL_PORT:-22}" -H "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Sync backend files
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_APP_ROOT: ${{ secrets.CPANEL_APP_ROOT }}
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'env/' \
            --exclude '__pycache__/' \
            --exclude 'db.sqlite3' \
            --exclude 'media/' \
            --exclude 'staticfiles/' \
            -e "ssh -p ${CPANEL_PORT:-22}" \
            ./ "${CPANEL_USERNAME}@${CPANEL_HOST}:${CPANEL_APP_ROOT}/"

      - name: Install requirements and restart app
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_APP_ROOT: ${{ secrets.CPANEL_APP_ROOT }}
          CPANEL_VENV_PATH: ${{ secrets.CPANEL_VENV_PATH }}
        run: |
          ssh -p "${CPANEL_PORT:-22}" "${CPANEL_USERNAME}@${CPANEL_HOST}" <<EOF
          set -e
          cd "${CPANEL_APP_ROOT}"
          source "${CPANEL_VENV_PATH}/bin/activate"
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          mkdir -p tmp
          touch tmp/restart.txt
          EOF
